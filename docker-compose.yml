version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bookdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./input:/data/input
      - ./output:/data/output
      - hf_cache:/root/.cache/huggingface   # cache the embedding model across restarts
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/bookdb
      - CHUNK_SIZE=20
    # bump replicas to add more parallel worker processes/machines
    deploy:
      replicas: 3

  flower:
    build: .
    command: celery -A app.celery_app.celery_app flower --port=5555
    depends_on:
      - redis
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0

  app:
    build: .
    command: python -m app.main /data/input/book.pdf
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./input:/data/input
      - ./output:/data/output
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/bookdb
      - CHUNK_SIZE=20

volumes:
  pgdata:
  hf_cache:
